<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="theme-color" content="#0d6efd">
    <title>Weather App</title>
    <link rel="icon" type="image/svg+xml" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/icons/cloud-sun-fill.svg">
    <link rel="apple-touch-icon" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/icons/cloud-sun-fill.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/bootstrap-icons.min.css">
</head>
<body class="bg-light min-vh-100">
    <main class="container py-4 py-lg-5">
        <section class="row justify-content-center">
            <div class="col-12 col-xl-10">
                <div class="card shadow-lg border-0 rounded-4 overflow-hidden bg-white">
                    <div class="card-body p-4 p-md-5">
                        <header class="d-flex flex-wrap justify-content-between align-items-start gap-3">
                            <div>
                                <p class="text-primary text-uppercase fw-bold small mb-1">SAWYER'S FORECAST STUDIO</p>
                                <h1 class="mb-1" id="txtLocation">Loading weather...</h1>
                                <p class="mb-0 text-secondary" id="txtHeaderSummary">--&deg; | --</p>
                                <p class="mb-0 text-secondary" id="txtUpdated">Updated --:--</p>
                            </div>
                            <button class="btn btn-primary px-3" id="btnRefresh" type="button" aria-label="Refresh weather">
                                Refresh Data
                            </button>
                        </header>

                        <div class="row mt-4 g-3 align-items-stretch">
                            <div class="col-12 col-lg-8">
                                <div class="card h-100 rounded-4">
                                    <div class="card-body py-4">
                                        <p class="text-uppercase small mb-1 text-secondary">Right Now</p>
                                        <p class="display-2 lh-1 mb-0 fw-bold" id="txtTemperature">--&deg;F</p>
                                        <p class="mb-1 text-secondary" id="txtFeelsLike">Feels like --&deg;F</p>
                                        <p class="mb-0 text-secondary" id="txtWind">Wind -- mph</p>
                                    </div>
                                </div>
                            </div>
                            <div class="col-12 col-lg-4">
                                <div class="card h-100 text-center d-flex flex-column justify-content-center rounded-4">
                                    <div class="card-body">
                                        <p class="text-uppercase small mb-2 text-secondary">Outside</p>
                                        <img class="mx-auto" width="82" height="82" id="imgConditionIcon" src="icons/cloud-fill.svg" alt="Current weather icon">
                                        <p class="mb-0 mt-2 h5" id="txtConditionText">Unknown</p>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="row mt-3 g-3">
                            <div class="col-12 col-md-4">
                                <div class="card h-100 rounded-4">
                                    <div class="card-body">
                                        <div class="d-flex align-items-center gap-2">
                                            <img width="24" height="24" src="icons/moisture.svg" alt="Humidity icon">
                                            <p class="text-uppercase small mb-0 text-secondary">Humidity</p>
                                        </div>
                                        <p class="h3 mb-0 mt-2" id="txtHumidity">--%</p>
                                    </div>
                                </div>
                            </div>
                            <div class="col-12 col-md-8">
                                <div class="card h-100 rounded-4">
                                    <div class="card-body">
                                        <div class="d-flex align-items-center gap-2">
                                            <img width="24" height="24" src="icons/umbrella.svg" alt="Rain icon">
                                            <p class="text-uppercase small mb-0 text-secondary">Chance of Rain</p>
                                        </div>
                                        <div class="progress mt-2" role="progressbar" aria-label="Rain chance percentage" aria-valuemin="0" aria-valuemax="100">
                                            <div class="progress-bar" id="divRainChanceBar" style="width: 0%">0%</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="row mt-3 g-3">
                            <div class="col-6 col-md-4">
                                <div class="card h-100 rounded-4">
                                    <div class="card-body">
                                        <p class="text-uppercase small mb-1 text-secondary">High Today</p>
                                        <p class="h4 mb-0" id="txtHighToday">--&deg;F</p>
                                    </div>
                                </div>
                            </div>
                            <div class="col-6 col-md-4">
                                <div class="card h-100 rounded-4">
                                    <div class="card-body">
                                        <p class="text-uppercase small mb-1 text-secondary">Low Today</p>
                                        <p class="h4 mb-0" id="txtLowToday">--&deg;F</p>
                                    </div>
                                </div>
                            </div>
                            <div class="col-12 col-md-4">
                                <div class="card h-100 rounded-4">
                                    <div class="card-body">
                                        <p class="text-uppercase small mb-1 text-secondary">Sunset</p>
                                        <p class="h4 mb-0" id="txtSunset">--:--</p>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <p class="text-danger mt-3 mb-0 d-none" id="txtError"></p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="text-center pb-4 px-3">
        Weather data by
        <a href="https://open-meteo.com/" target="_blank" rel="noopener">Open-Meteo.com</a>
        (<a href="https://open-meteo.com/en/docs" target="_blank" rel="noopener">API Docs</a>)
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="js/app.js"></script>
</body>
</html>
